name: Build & Release

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  # ── Build both platforms in parallel ───────────────────────────────────────
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: Windows
            artifact_name: ThermodynamicsLab-Windows
            artifact_path: dist/ThermodynamicsLab.exe

          - os: macos-latest
            platform: macOS
            artifact_name: ThermodynamicsLab-macOS
            artifact_path: dist/ThermodynamicsLab-macOS.zip

    runs-on: ${{ matrix.os }}
    name: Build · ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build executable
        run: pyinstaller --clean ThermodynamicsLab.spec

      - name: Package .app bundle (macOS only)
        if: runner.os == 'macOS'
        run: ditto -c -k --keepParent dist/ThermodynamicsLab.app dist/ThermodynamicsLab-macOS.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}

  # ── Publish a GitHub Release so users can download from the repo page ──────
  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true   # puts both files flat in artifacts/

      - name: Write release notes
        run: |
          REPO="${{ github.repository }}"
          SHA="${{ github.sha }}"
          SHORT="${SHA:0:7}"
          cat > release-notes.md << EOF
          ## Download

          | Platform | File |
          |---|---|
          | **Windows** | [ThermodynamicsLab.exe](https://github.com/${REPO}/releases/latest/download/ThermodynamicsLab.exe) |
          | **macOS** | [ThermodynamicsLab-macOS.zip](https://github.com/${REPO}/releases/latest/download/ThermodynamicsLab-macOS.zip) |

          > **macOS:** unzip → right-click the \`.app\` → **Open** (one-time Gatekeeper bypass)

          Built from [\`${SHORT}\`](https://github.com/${REPO}/commit/${SHA})
          EOF

      - name: Publish release (tag = latest, always overwritten)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --yes 2>/dev/null || true
          git tag -f latest
          git push origin latest --force
          gh release create latest \
            --title "Thermodynamics Lab · Latest Build" \
            --notes-file release-notes.md \
            --latest \
            artifacts/ThermodynamicsLab.exe \
            artifacts/ThermodynamicsLab-macOS.zip
